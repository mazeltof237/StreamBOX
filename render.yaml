# Render Blueprint — déploie automatiquement le backend Django.
# Sur Render : New → Blueprint → sélectionner le repo.
services:
  - type: web
    name: streambox-api
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn streambox.wsgi:application --bind 0.0.0.0:$PORT --workers 3"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.vercel.app"
      # Décommenter et lier à une base PostgreSQL Render pour la prod :
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: streambox-db
      #     property: connectionString

